<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a12">
  <meta name="description" content="あなた専用のAIマネージャーアプリ">
  <title>Manager AI</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/app.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <!-- ========== ログイン画面 ========== -->
  <div id="login-screen" class="screen active">
    <div class="login-container">
      <div class="login-card">
        <div class="login-avatar">
          <img src="/static/icons/avatar.png" alt="Manager AI">
        </div>
        <h1 class="login-title">Manager AI</h1>
        <p class="login-subtitle">頼れる相棒、マネージャーAI</p>
        <form id="login-form">
          <input type="password" id="password-input" class="login-input" placeholder="パスワードを入力" autocomplete="current-password">
          <button type="submit" class="login-btn">
            <span>ログイン</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </button>
        </form>
        <p id="login-error" class="login-error"></p>
      </div>
    </div>
  </div>

  <!-- ========== メイン画面 ========== -->
  <div id="main-screen" class="screen">
    <!-- ヘッダー -->
    <header class="header">
      <div class="header-left">
        <div class="header-avatar">
          <img src="/static/icons/avatar.png" alt="Avatar">
        </div>
        <div class="header-info">
          <span class="header-name">Manager AI</span>
          <span class="header-status" id="status-indicator">オンライン</span>
        </div>
      </div>
      <nav class="header-nav">
        <button class="nav-btn active" data-tab="chat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span>チャット</span>
        </button>
        <button class="nav-btn" data-tab="dashboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
          <span>ダッシュボード</span>
        </button>
      </nav>
    </header>

    <!-- ========== チャットタブ ========== -->
    <div id="chat-tab" class="tab-content active">
      <div id="chat-messages" class="chat-messages">
        <div class="chat-welcome">
          <div class="welcome-inner">
            <div class="welcome-avatar">
              <img src="/static/icons/avatar.png" alt="">
            </div>
            <h2>こんにちは！</h2>
            <p>何でも話しかけてね。予定確認、タスク管理、メモ…何でもお任せ！</p>
          </div>
        </div>
      </div>

      <!-- クイックアクション (横スクロール) -->
      <div class="action-chips-area">
        <div class="action-chips" id="action-chips">
          <button class="chip-btn" onclick="sendActionCommand('☀️ 今日の予定を教えて')">
            <span class="chip-icon">☀️</span><span>今日の予定</span>
          </button>
          <button class="chip-btn" onclick="sendActionCommand('💼 今から仕事を始めるよ')">
            <span class="chip-icon">💼</span><span>仕事開始</span>
          </button>
          <button class="chip-btn" onclick="sendActionCommand('🏠 仕事終わったよ。お疲れ！')">
            <span class="chip-icon">🏠</span><span>仕事終了</span>
          </button>
          <button class="chip-btn" onclick="sendActionCommand('💡 少しアイデアをメモしてほしい')">
            <span class="chip-icon">💡</span><span>メモ</span>
          </button>
          <button class="chip-btn" onclick="sendActionCommand('📝 今日の振り返りをしよう')">
            <span class="chip-icon">📝</span><span>振り返り</span>
          </button>
          <button class="chip-btn" onclick="sendActionCommand('📊 睡眠レポートを教えて')">
            <span class="chip-icon">📊</span><span>睡眠</span>
          </button>
          <button class="chip-btn" onclick="sendActionCommand('📚 学習ノートを作成したい')">
            <span class="chip-icon">📚</span><span>学習ノート</span>
          </button>
        </div>
      </div>

      <!-- 入力エリア -->
      <div class="chat-input-area">
        <form id="chat-form">
          <div class="input-wrapper">
            <textarea id="message-input" placeholder="メッセージを入力…" rows="1"></textarea>
            <button type="submit" class="send-btn" id="send-btn" aria-label="送信">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- ========== ダッシュボードタブ ========== -->
    <div id="dashboard-tab" class="tab-content">
      <div class="dashboard-container">
        <div class="dash-section-header">
          <h2>📅 今日のスケジュール</h2>
          <span class="dash-date" id="dash-date-label"></span>
        </div>

        <div class="dash-card glass-card">
          <div class="dash-card-header">
            <div class="dash-card-icon" style="background: rgba(99, 179, 237, 0.15); color: #63b3ed;">📅</div>
            <span class="dash-card-title">Google カレンダー</span>
          </div>
          <div class="dash-card-body" id="dash-google-calendar">
            <div class="dash-skeleton"></div>
          </div>
        </div>

        <div class="dash-card glass-card">
          <div class="dash-card-header">
            <div class="dash-card-icon" style="background: rgba(72, 187, 120, 0.15); color: #48bb78;">✅</div>
            <span class="dash-card-title">Google Tasks</span>
          </div>
          <div class="dash-card-body" id="dash-google-tasks">
            <div class="dash-skeleton"></div>
          </div>
        </div>

        <div class="dash-card glass-card">
          <div class="dash-card-header">
            <div class="dash-card-icon" style="background: rgba(237, 137, 54, 0.15); color: #ed8936;">🎯</div>
            <span class="dash-card-title">Obsidian タスク</span>
          </div>
          <div class="dash-card-body" id="dash-tasks">
            <div class="dash-skeleton"></div>
          </div>
        </div>

        <div class="dash-card glass-card">
          <div class="dash-card-header">
            <div class="dash-card-icon" style="background: rgba(159, 122, 234, 0.15); color: #9f7aea;">🪞</div>
            <span class="dash-card-title">Alter Log</span>
          </div>
          <div class="dash-card-body" id="dash-alter-log">
            <div class="dash-skeleton"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
