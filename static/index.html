<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a12">
    <title>AI Manager</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <!-- ========== LOGIN SCREEN ========== -->
    <div id="login-screen" class="screen active">
        <div class="login-container">
            <div class="login-card">
                <div class="login-avatar">
                    <img src="/static/icons/avatar.png" alt="AI Manager">
                </div>
                <h1 class="login-title">Manager AI</h1>
                <p class="login-subtitle">Your personal AI partner</p>
                <form id="login-form">
                    <input type="password" id="password-input" class="login-input" placeholder="パスワードを入力" autocomplete="current-password">
                    <button type="submit" class="login-btn">ログイン</button>
                </form>
                <p id="login-error" class="login-error"></p>
            </div>
        </div>
    </div>

    <!-- ========== MAIN SCREEN ========== -->
    <div id="main-screen" class="screen">
        <!-- TOP HEADER -->
        <header class="top-header">
            <div class="header-partner">
                <div class="partner-avatar">
                    <img src="/static/icons/avatar.png" alt="Manager">
                    <span class="status-indicator"></span>
                </div>
                <div class="partner-info">
                    <div class="partner-name">マネージャー</div>
                    <div class="partner-status" id="current-tab-title">チャット</div>
                </div>
            </div>
            <div class="header-right">
                <button class="icon-btn" id="reset-chat-btn" title="チャット履歴リセット">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                </button>
                <button class="icon-btn" id="settings-btn" title="設定">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </button>
            </div>
        </header>

        <!-- TAB CONTENTS -->
        <main class="content-area">
            <!-- ========== CHAT TAB ========== -->
            <div id="tab-chat" class="tab-pane active">
                <div id="chat-messages" class="chat-messages">
                    <div class="chat-welcome">
                        <h2>こんにちは。</h2>
                        <p>今日はどんなお手伝いをしましょうか？</p>
                    </div>
                </div>
                <div class="action-chips-container">
                    <div class="action-chips">
                        <button class="chip-btn" onclick="sendActionCommand('今日の予定を教えて')">今日の予定</button>
                        <button class="chip-btn special" onclick="openIntelligentTaskModal('start')">タスク開始</button>
                        <button class="chip-btn special" onclick="openIntelligentTaskModal('end')">タスク終了</button>
                        <button class="chip-btn" onclick="sendActionCommand('英語学習を始める')">英語学習</button>
                        <button class="chip-btn" onclick="sendActionCommand('振り返りをしよう')">振り返り</button>
                    </div>
                </div>
                <div class="chat-input-area">
                    <form id="chat-form">
                        <div class="input-wrapper">
                            <textarea id="message-input" placeholder="メッセージを入力..." rows="1"></textarea>
                            <button type="submit" class="send-btn" id="send-btn">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- ========== INFO TAB (WEATHER/NEWS) ========== -->
            <div id="tab-info" class="tab-pane">
                <div class="scroll-container">
                    <!-- Date at top of Info Tab -->
                    <div class="date-header" id="dash-date-label">---</div>

                    <div class="card weather-card">
                        <div class="card-header">
                            <span class="card-icon">☁️</span>
                            <span class="card-title">Yahoo!天気 (岡山南部)</span>
                        </div>
                        <div id="dash-weather" class="card-body">読み込み中...</div>
                    </div>
                    <div class="card notebook-card">
                        <div class="card-header">
                            <span class="card-icon">📚</span>
                            <span class="card-title">ナレッジ拠点 (NotebookLM)</span>
                        </div>
                        <div class="card-body list-body" id="dash-notebooks">
                            <!-- Notebook links injected by JS -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- ========== LOG TAB (OBSIDIAN/SLEEP/DIARY) ========== -->
            <div id="tab-log" class="tab-pane">
                <div class="scroll-container">
                    <div class="card obsidian-card">
                        <div class="card-header">
                            <span class="card-icon">🎯</span>
                            <span class="card-title">ライフログ</span>
                        </div>
                        <div id="dash-tasks" class="card-body"></div>
                    </div>
                    <div class="card health-card">
                        <div class="card-header">
                            <span class="card-icon">🌙</span>
                            <span class="card-title">昨夜の睡眠</span>
                        </div>
                        <div id="dash-sleep" class="card-body"></div>
                    </div>
                    <div class="card diary-card">
                        <div class="card-header">
                            <span class="card-icon">📒</span>
                            <span class="card-title">観察日記</span>
                        </div>
                        <div id="dash-alter-log" class="card-body diary-content"></div>
                    </div>
                    <div class="card maps-card">
                        <div class="card-header">
                            <span class="card-icon">📍</span>
                            <span class="card-title">ロケーションログ</span>
                        </div>
                        <div class="card-body">
                            <p class="mb-10 text-secondary" style="font-size: 0.85rem;">今日の足取りを記録しましたか？</p>
                            <a href="https://www.google.com/maps/timeline" target="_blank" class="modal-btn submit block-link" style="text-decoration: none; text-align: center; display: block;">Google マップで確認</a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ========== SCHEDULE TAB (CALENDAR/TASKS) ========== -->
            <div id="tab-schedule" class="tab-pane">
                <div class="scroll-container">

                    <div class="card calendar-card">
                        <div class="card-header">
                            <span class="card-icon">📅</span>
                            <span class="card-title">カレンダー</span>
                            <button class="mini-link" onclick="openAddEventModal()" style="border:none; cursor:pointer;">追加</button>
                            <a href="https://calendar.google.com/" target="_blank" class="mini-link">開く</a>
                        </div>
                        <div id="dash-google-calendar" class="card-body list-body"></div>
                    </div>

                    <div class="card tasks-card">
                        <div class="card-header">
                            <span class="card-icon">✅</span>
                            <span class="card-title">タスク</span>
                            <a href="https://calendar.google.com/" target="_blank" class="mini-link">カレンダーで確認</a>
                        </div>
                        <div id="dash-google-tasks" class="card-body list-body"></div>
                    </div>
                </div>
            </div>
        </main>

        <!-- BOTTOM NAVIGATION (LINE-like) -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-tab="chat">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                <span>チャット</span>
            </button>
            <button class="nav-item" data-tab="info">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                <span>情報</span>
            </button>
            <button class="nav-item" data-tab="log">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                <span>ログ</span>
            </button>
            <button class="nav-item" data-tab="schedule">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span>予定</span>
            </button>
        </nav>
    </div>

    <!-- ========== INTELLIGENT TASK MODAL ========== -->
    <div id="task-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <h3 id="modal-title">タスク選択</h3>
            <div id="modal-list" class="modal-list">
                <!-- 候補がここに並ぶ -->
            </div>
            <div class="modal-input-area">
                <input type="text" id="custom-task-input" placeholder="新しいタスク名を入力...">
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeTaskModal()">キャンセル</button>
                <button class="modal-btn submit" id="task-confirm-btn">確定</button>
            </div>
        </div>
    </div>

    <!-- ========== EDIT MODAL (FOR CAL/TASK) ========== -->
    <div id="edit-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <h3 id="edit-modal-title">編集</h3>
            <input type="text" id="edit-input" class="modern-input">
            <div class="modal-actions mt-20">
                <button class="modal-btn cancel" onclick="closeEditModal()">閉じる</button>
                <button class="modal-btn delete" id="edit-delete-btn">削除</button>
                <button class="modal-btn submit" id="edit-save-btn">保存</button>
            </div>
        </div>
    </div>
    <!-- ========== ADD EVENT MODAL ========== -->
    <div id="event-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <h3>予定を追加</h3>
            <div class="modal-body mt-20">
                <div class="input-group">
                    <label>タイトル</label>
                    <input type="text" id="event-summary" class="modern-input" placeholder="会議、買い物など">
                </div>
                <div class="input-row mt-10">
                    <div class="input-group">
                        <label>開始</label>
                        <input type="datetime-local" id="event-start" class="modern-input">
                    </div>
                    <div class="input-group">
                        <label>終了</label>
                        <input type="datetime-local" id="event-end" class="modern-input">
                    </div>
                </div>
                <div class="input-group mt-10">
                    <label>詳細</label>
                    <textarea id="event-desc" class="modern-input" rows="2"></textarea>
                </div>
            </div>
            <div class="modal-actions mt-20">
                <button class="modal-btn cancel" onclick="closeEventModal()">キャンセル</button>
                <button class="modal-btn submit" onclick="saveEvent()">追加</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="/static/js/app.js"></script>
</body>
</html>
